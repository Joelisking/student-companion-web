services:
  - type: web
    name: student-companion-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
